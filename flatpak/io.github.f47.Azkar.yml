app-id: io.github.f47.Azkar
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: azkar-app
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher # For System Tray

modules:
  - name: azkar
    buildsystem: simple
    build-commands:
      # Binary
      - install -D azkar-app /app/bin/azkar-app
      
      # Icons
      - install -D icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.f47.Azkar.png
      - install -D icons/64x64.png /app/share/icons/hicolor/64x64/apps/io.github.f47.Azkar.png
      - install -D icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.f47.Azkar.png
      
      # Desktop file and Metainfo
      - install -D io.github.f47.Azkar.desktop /app/share/applications/io.github.f47.Azkar.desktop
      - install -D io.github.f47.Azkar.metainfo.xml /app/share/metainfo/io.github.f47.Azkar.metainfo.xml
    sources:
      - type: dir
        path: dist
