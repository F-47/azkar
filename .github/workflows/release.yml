name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    env:
      CARGO_INCREMENTAL: 0

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      # Sync version from tag
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ github.ref_name }}'.replace(/^v/, '');

            const jsonFiles = [
              'package.json',
              'apps/desktop/package.json',
              'apps/web/package.json',
              'apps/desktop/src-tauri/tauri.conf.json'
            ];

            jsonFiles.forEach(file => {
              if (fs.existsSync(file)) {
                const json = JSON.parse(fs.readFileSync(file, 'utf8'));
                json.version = version;
                fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
                console.log('Updated ' + file);
              }
            });

            const cargoPath = 'apps/desktop/src-tauri/Cargo.toml';
            if (fs.existsSync(cargoPath)) {
              let cargo = fs.readFileSync(cargoPath, 'utf8');
              cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + version + '\"');
              fs.writeFileSync(cargoPath, cargo);
              console.log('Updated Cargo.toml');
            }
          "

      # Build + GitHub Release via Tauri
      - name: Build and release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Azkar ${{ github.ref_name }}"
          releaseBody: "أذكار الصباح والمساء — ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  flatpak:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Setup Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean build-dir apps/desktop/flatpak/com.azkar.app.json

      - name: Export Flatpak repo
        run: |
          flatpak build-export repo build-dir

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo azkar.flatpak com.azkar.app

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: azkar.flatpak

      - name: Upload Flatpak to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: azkar.flatpak
