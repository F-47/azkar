name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    env:
      CARGO_INCREMENTAL: 0

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ github.ref_name }}'.replace(/^v/, '');
            
            const jsonFiles = [
              'package.json',
              'apps/desktop/package.json',
              'apps/web/package.json',
              'apps/desktop/src-tauri/tauri.conf.json'
            ];
            
            jsonFiles.forEach(file => {
              if (fs.existsSync(file)) {
                const content = fs.readFileSync(file, 'utf8');
                const json = JSON.parse(content);
                json.version = version;
                fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
                console.log('Updated ' + file + ' to ' + version);
              }
            });

            const cargoPath = 'apps/desktop/src-tauri/Cargo.toml';
            if (fs.existsSync(cargoPath)) {
              let cargo = fs.readFileSync(cargoPath, 'utf8');
              cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + version + '\"');
              fs.writeFileSync(cargoPath, cargo);
              console.log('Updated ' + cargoPath + ' to ' + version);
            }
          "

      - name: Build and release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Azkar ${{ github.ref_name }}"
          releaseBody: "أذكار الصباح والمساء — ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  flatpak:
    name: Build Flatpak
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder

      - name: Download Linux DEB from Release
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: ${{ github.ref_name }}
          regex: true
          file: "azkar-app_.*_amd64.deb"
          target: "azkar.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Flatpak Dist
        run: |
          mkdir -p flatpak/dist/icons
          dpkg-deb -x azkar.deb temp_deb
          # Copy binary
          cp temp_deb/usr/bin/azkar-app flatpak/dist/
          # Copy icons (adjust paths based on where tauri puts them in deb)
          cp temp_deb/usr/share/icons/hicolor/32x32/apps/azkar-app.png flatpak/dist/icons/32x32.png || cp apps/desktop/src-tauri/icons/32x32.png flatpak/dist/icons/32x32.png
          cp temp_deb/usr/share/icons/hicolor/64x64/apps/azkar-app.png flatpak/dist/icons/64x64.png || cp apps/desktop/src-tauri/icons/64x64.png flatpak/dist/icons/64x64.png
          cp temp_deb/usr/share/icons/hicolor/128x128/apps/azkar-app.png flatpak/dist/icons/128x128.png || cp apps/desktop/src-tauri/icons/128x128.png flatpak/dist/icons/128x128.png
          # Use the high-res one for 256x256
          cp apps/desktop/src-tauri/icons/icon.png flatpak/dist/icons/128x128@2x.png

      - name: Setup Flatpak Repo
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak Runtimes
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
          key: flatpak-runtimes-${{ runner.os }}-gnome47

      - name: Install Runtimes
        run: |
          flatpak install --user -y flathub org.gnome.Sdk//47 org.gnome.Platform//47

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo --bundle-sources build-dir flatpak/io.github.f47.Azkar.yml
          flatpak build-bundle repo azkar.flatpak io.github.f47.Azkar

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: azkar.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
